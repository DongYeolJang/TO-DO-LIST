<!-- apple-touch-icon: PNG generated by Canvas at runtime (iOS requires PNG) -->
<link rel="apple-touch-icon" id="apple-touch-icon-link" sizes="180x180">
<script>
(function(){
  try {
    var sz = 512;
    var c = document.createElement('canvas');
    c.width = c.height = sz;
    var ctx = c.getContext('2d');
    var r = sz / 4.57; // corner radius ~112px equivalent

    // Rounded rect clip
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(sz-r, 0);
    ctx.quadraticCurveTo(sz, 0, sz, r);
    ctx.lineTo(sz, sz-r); ctx.quadraticCurveTo(sz, sz, sz-r, sz);
    ctx.lineTo(r, sz); ctx.quadraticCurveTo(0, sz, 0, sz-r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.clip();

    // Background
    ctx.fillStyle = '#0F0F14';
    ctx.fillRect(0, 0, sz, sz);

    // Inner card bg circle
    ctx.beginPath();
    ctx.arc(sz/2, sz/2, 175, 0, Math.PI*2);
    ctx.fillStyle = '#1A1A24';
    ctx.fill();

    // Gradient for ring & check
    var grd = ctx.createLinearGradient(80, 80, 432, 432);
    grd.addColorStop(0, '#6C63FF');
    grd.addColorStop(1, '#43D9A0');

    // Ring track
    ctx.beginPath();
    ctx.arc(sz/2, sz/2, 148, 0, Math.PI*2);
    ctx.strokeStyle = '#222232';
    ctx.lineWidth = 28;
    ctx.stroke();

    // Ring fill ~78%
    ctx.beginPath();
    ctx.arc(sz/2, sz/2, 148, -Math.PI/2, -Math.PI/2 + Math.PI*2*0.78);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 28;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Checkmark
    ctx.beginPath();
    ctx.moveTo(178, 258); ctx.lineTo(228, 308); ctx.lineTo(334, 202);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 36;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();

    var png = c.toDataURL('image/png');
    document.getElementById('apple-touch-icon-link').href = png;
  } catch(e) { console.warn('Icon generation failed:', e); }
})();
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

/* ── TOKENS ── */
:root{
  --bg:#0F0F14;--card:#1A1A24;--card2:#222232;--border:#2E2E42;
  --accent:#6C63FF;--accent2:#8B85FF;
  --routine:#43D9A0;--exercise:#FF6584;--other:#FFB347;
  --text:#E0E0F0;--text2:#9090B0;--text3:#5A5A7A;
  --danger:#FF4F6A;--tab-h:68px;
}
[data-theme="light"]{
  --bg:#F2F2FA;--card:#FFFFFF;--card2:#EAEAF5;--border:#D4D4EC;
  --text:#1A1A2E;--text2:#5858A0;--text3:#9898C0;
}

/* ── BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available;background:#0F0F14}
body{
  font-family:'Inter','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  max-width:480px;margin:0 auto;
  height:100dvh;
  min-height:-webkit-fill-available;
  /* overflow은 body에서 제거 — iOS PWA에서 키보드 올라오는걸 막지 않도록 */
  position:relative;
}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;background:#0F0F14;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none}
#splash.gone{display:none}
.splash-logo-wrap{width:100px;height:100px;border-radius:28px;background:linear-gradient(135deg,#1A1A24,#222232);border:1px solid #2E2E42;display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(108,99,255,.35),0 20px 60px rgba(0,0,0,.5);margin-bottom:28px;animation:splashPop .6s cubic-bezier(.34,1.56,.64,1) both}
.splash-logo-wrap svg{width:60px;height:60px}
.splash-app-name{font-size:30px;font-weight:800;letter-spacing:-.8px;background:linear-gradient(135deg,#6C63FF,#43D9A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:splashFadeUp .5s .2s ease both;margin-bottom:10px}
.splash-tagline{font-size:14px;color:#9090B0;text-align:center;line-height:1.6;padding:0 32px;animation:splashFadeUp .5s .35s ease both}
.splash-dots{display:flex;gap:6px;margin-top:36px;animation:splashFadeUp .4s .5s ease both}
.splash-dot{width:6px;height:6px;border-radius:50%;background:#2E2E42}
.splash-dot:nth-child(1){animation:dotPulse 1.2s .6s ease-in-out infinite}
.splash-dot:nth-child(2){animation:dotPulse 1.2s .75s ease-in-out infinite}
.splash-dot:nth-child(3){animation:dotPulse 1.2s .9s ease-in-out infinite}
@keyframes splashPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes splashFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPulse{0%,100%{background:#2E2E42}50%{background:#6C63FF}}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px;
  overflow-y:auto;           /* 키보드 올라왔을 때 스크롤 가능 */
  -webkit-overflow-scrolling:touch;
}
#login-screen.show{display:flex;animation:fadeIn .3s ease}
.login-logo{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#1A1A24,#222232);border:1px solid #2E2E42;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(108,99,255,.25);margin-bottom:24px}
.login-logo svg{width:48px;height:48px}
.login-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;text-align:center}
.login-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.6;margin-bottom:40px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;max-width:320px;padding:14px 24px;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.google-btn:hover{border-color:var(--accent);background:var(--card2)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
.login-note{font-size:11px;color:var(--text3);margin-top:20px;text-align:center;line-height:1.6}

/* ── SYNC DOT ── */
#sync-dot{position:fixed;top:14px;right:14px;z-index:500;width:8px;height:8px;border-radius:50%;background:var(--text3);transition:.3s}
#sync-dot.syncing{background:#FFB347;animation:syncPulse .8s ease-in-out infinite}
#sync-dot.synced{background:var(--routine)}
#sync-dot.error{background:var(--danger)}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
#app-content{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch; /* iOS momentum scroll */
  overscroll-behavior-y:contain;
  padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 12px);
  scroll-behavior:smooth;
  /* 높이를 명시해야 iOS PWA에서 스크롤 작동 */
  min-height:0;
}
#app-content::-webkit-scrollbar{display:none}

/* ── TAB BAR ── */
#tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--tab-h);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;color:var(--text3);font-size:10px;font-weight:500;letter-spacing:.3px;transition:color .2s}
.tab-btn svg{transition:transform .2s}
.tab-btn.active{color:var(--accent)}
.tab-btn.active svg{transform:translateY(-2px)}

/* ── PAGES ── */
.page{display:none;padding:20px 16px 0;animation:fadeIn .22s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.header-action{background:var(--card2);border:1px solid var(--border);color:var(--accent);padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.header-action:hover{background:var(--accent);color:#fff}

/* ── HOME ── */
.date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 14px;margin-bottom:18px}
.date-nav-center{flex:1;text-align:center}
.date-main{font-size:15px;font-weight:700;letter-spacing:-.2px}
.date-sub{font-size:11px;color:var(--text2);margin-top:2px}
.date-arrow{width:32px;height:32px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.15s;flex-shrink:0}
.date-arrow:hover{color:var(--accent);border-color:var(--accent)}
.today-pill{background:var(--accent);color:#fff;border:none;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.3px;margin-left:8px;transition:.2s}
.today-pill:hover{background:var(--accent2)}
.today-pill.hidden{opacity:0;pointer-events:none}
.progress-wrap{display:flex;align-items:center;justify-content:center;flex-direction:column;margin:10px 0 20px}
.progress-ring-container{position:relative;width:150px;height:150px}
.progress-ring-container svg{transform:rotate(-90deg)}
circle.bg{fill:none;stroke:var(--card2);stroke-width:10}
circle.fill{fill:none;stroke:url(#ringGrad);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)}
.progress-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-pct{font-size:34px;font-weight:800;letter-spacing:-1px}
.progress-label{font-size:10px;color:var(--text2);letter-spacing:.6px;margin-top:2px;text-transform:uppercase}
.cat-chips{display:flex;gap:8px;margin-bottom:20px}
.cat-chip{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:.2s}
.cat-chip:hover{border-color:var(--accent)}
.cat-chip-dot{width:8px;height:8px;border-radius:50%;margin:0 auto 6px}
.cat-chip-name{font-size:11px;color:var(--text2);font-weight:500}
.cat-chip-count{font-size:17px;font-weight:700;margin-top:2px}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.9px;text-transform:uppercase;margin-bottom:10px}
.quick-list{display:flex;flex-direction:column;gap:8px}
.quick-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.15s}
.quick-item:hover{background:var(--card2)}
.quick-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.quick-text{flex:1;font-size:14px;font-weight:500}
.quick-tag{font-size:10px;color:var(--text3);background:var(--card2);padding:3px 8px;border-radius:20px}

/* ── CHECKLIST ── */
.checklist{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.check-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:12px;transition:.2s;position:relative;overflow:hidden}
.check-item.done::before{background:var(--item-color,var(--accent))}
.check-item.done{opacity:.55}
.check-item.done .check-label{text-decoration:line-through;color:var(--text3)}
.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.check-item.done .checkbox{border-color:transparent;box-shadow:0 0 0 2.5px color-mix(in srgb,currentColor 25%,transparent),0 2px 8px color-mix(in srgb,currentColor 30%,transparent)}
.checkbox svg{display:none;transform:scale(0) rotate(-20deg);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.check-item.done .checkbox svg{display:block;transform:scale(1) rotate(0deg)}
.check-label{flex:1;font-size:14px;font-weight:500;line-height:1.3;cursor:pointer}
.check-sub{font-size:11px;color:var(--text2);margin-top:2px}
.check-actions{display:flex;gap:6px;opacity:0;transition:.2s;flex-shrink:0}
.check-item:hover .check-actions{opacity:1}
.icon-btn{width:28px;height:28px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.15s;flex-shrink:0}
.icon-btn:hover{color:var(--accent);border-color:var(--accent)}
.icon-btn.danger:hover{color:var(--danger);border-color:var(--danger)}
.saved-chips{display:flex;flex-wrap:wrap;gap:6px}
.saved-chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.saved-chip:hover{border-color:var(--accent);color:var(--accent)}
.saved-chip-del{color:var(--text3);font-size:15px;line-height:1;padding:0 2px}
.saved-chip-del:hover{color:var(--danger)}
.prog-bar-wrap{margin-bottom:16px}
.prog-bar-bg{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}

/* ── CALENDAR ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:18px;font-weight:700}
.cal-nav{display:flex;gap:8px}
.cal-nav-btn{width:34px;height:34px;border-radius:10px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.15s}
.cal-nav-btn:hover{color:var(--accent);border-color:var(--accent)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px;padding:6px 0 8px}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.15s;gap:2px;background:var(--card);border:1px solid transparent}
.cal-day:hover{border-color:var(--border)}
.cal-day.empty{background:transparent;cursor:default;border-color:transparent}
.cal-day.today{border-color:var(--accent)!important}
.cal-day.selected{background:var(--card2);border-color:var(--accent)}
.cal-day-num{font-size:12px;font-weight:600;line-height:1}
.cal-day.today .cal-day-num{color:var(--accent)}
.cal-day-pct{font-size:9px;font-weight:700;color:var(--text3)}
.cal-dots{display:flex;gap:2px;margin-top:1px;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
.day-detail-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.day-detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.day-detail-title{font-size:14px;font-weight:700}
.day-detail-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.day-detail-items{display:flex;flex-direction:column;gap:6px}
.day-detail-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.day-detail-item:last-child{border-bottom:none}
.day-detail-check{width:14px;height:14px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.day-detail-text{font-size:13px;flex:1}
.day-detail-text.done-text{text-decoration:line-through;color:var(--text3)}

/* ── SETTINGS ── */
.settings-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--routine));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto 10px;overflow:hidden}
.settings-name{text-align:center;font-size:18px;font-weight:700;margin-bottom:3px}
.settings-email{text-align:center;font-size:13px;color:var(--text2);margin-bottom:24px}
.settings-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;transition:.15s}
.settings-row:hover{background:var(--card2)}
.settings-row-label{font-size:14px;font-weight:500}
.settings-row-value{font-size:13px;color:var(--text2)}
.toggle{width:44px;height:26px;background:var(--border);border-radius:13px;position:relative;transition:.25s;cursor:pointer}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.25s}
.toggle.on::after{left:21px}
.theme-pills{display:flex;gap:8px}
.theme-pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--border);cursor:pointer;transition:.15s;background:var(--card2)}
.theme-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.logout-btn{width:100%;padding:14px;border-radius:14px;background:transparent;border:1px solid var(--danger);color:var(--danger);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:.2s}
.logout-btn:hover{background:var(--danger);color:#fff}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex;animation:fadeIn .2s}
.modal{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:24px 20px 32px;animation:slideUp .28s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
.modal input,.modal textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal textarea{resize:none;height:76px;margin-top:10px}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn{padding:12px 0;border-radius:14px;font-size:14px;font-weight:600;border:none;cursor:pointer;flex:1;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--card2);color:var(--text2);border:1px solid var(--border)}

<!-- ══════════════════════════════════════════════
  SINGLE SCRIPT — Firebase via dynamic import
══════════════════════════════════════════════ -->
<script>
'use strict';

/* ─────────────────────────────────────────
   HELPERS
───────────────────────────────────────── */
const DAY_KO  = ['일','월','화','수','목','금','토'];
const MONTH_KO= ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const dateKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey = () => dateKey(new Date());

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let state = {
  otherLabel: '기타',
  theme: 'dark',
  templates: { routine:[], exercise:[] },
  days: {}
};

// Restore local backup immediately so UI shows something before Firebase loads
try { const b=localStorage.getItem('todo-bak'); if(b) Object.assign(state, JSON.parse(b)); } catch(e){}

function getDay(key) {
  if (!state.days[key]) state.days[key] = {routine:[],exercise:[],other:[]};
  return state.days[key];
}

/* ─────────────────────────────────────────
   FIREBASE — loaded dynamically (no module script needed)
───────────────────────────────────────── */
const FB_CFG = {
  apiKey: "AIzaSyBBcBYyMGSasS2cwETYpma4DHD5aDiOcNM",
  authDomain: "work-out-8abe1.firebaseapp.com",
  projectId: "work-out-8abe1",
  storageBucket: "work-out-8abe1.firebasestorage.app",
  messagingSenderId: "354292761145",
  appId: "1:354292761145:web:8239a4d9ebfe190c6a43e8",
  measurementId: "G-8JBGQFBJDP"
};

let fbAuth, fbDb, fbUser = null, fbUnsub = null, fbSaveTimer = null;

// Namespace exposed to HTML onclick handlers that need async Firebase
const APP = {
  signIn: async () => {
    try {
      const { GoogleAuthProvider, signInWithPopup } = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js');
      await signInWithPopup(fbAuth, new GoogleAuthProvider());
    } catch(e) { showToast('로그인 실패: ' + e.message); }
  },
  signOut: async () => {
    if (!confirm('로그아웃 하시겠어요?')) return;
    if (fbUnsub) fbUnsub();
    const { signOut } = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js');
    await signOut(fbAuth);
    fbUser = null;
    showToast('로그아웃 되었어요');
    document.getElementById('login-screen').classList.add('show');
  }
};

async function initFirebase() {
  const { initializeApp }        = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js');
  const { getAuth, GoogleAuthProvider, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js');
  const { getFirestore, doc, getDoc, setDoc, onSnapshot }  = await import('https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js');

  const fbApp = initializeApp(FB_CFG);
  fbAuth = getAuth(fbApp);
  fbDb   = getFirestore(fbApp);

  const userRef = uid => doc(fbDb, 'users', uid, 'data', 'app');

  // Debounced Firestore write
  window.saveState = function() {
    try { localStorage.setItem('todo-bak', JSON.stringify(state)); } catch(e) {}
    if (!fbUser) return;
    setSyncDot('syncing');
    clearTimeout(fbSaveTimer);
    fbSaveTimer = setTimeout(async () => {
      try {
        await setDoc(userRef(fbUser.uid), state);
        setSyncDot('synced');
      } catch(e) {
        setSyncDot('error');
        showToast('저장 실패, 재시도 중…');
        setTimeout(async () => {
          try { await setDoc(userRef(fbUser.uid), state); setSyncDot('synced'); }
          catch(e2) { setSyncDot('error'); }
        }, 3000);
      }
    }, 800);
  };

  onAuthStateChanged(fbAuth, async user => {
    if (user) {
      fbUser = user;
      document.getElementById('login-screen').classList.remove('show');
      // Load data
      setSyncDot('syncing');
      try {
        const snap = await getDoc(userRef(user.uid));
        if (snap.exists()) Object.assign(state, snap.data());
        setSyncDot('synced');
      } catch(e) { setSyncDot('error'); showToast('데이터 로드 실패'); }

      // Real-time sync from other devices
      if (fbUnsub) fbUnsub();
      fbUnsub = onSnapshot(userRef(user.uid), snap => {
        if (snap.exists() && !snap.metadata.hasPendingWrites) {
          Object.assign(state, snap.data());
          reRenderActive();
          setSyncDot('synced');
        }
      }, () => setSyncDot('error'));

      applyState();
      dismissSplash();
    } else {
      fbUser = null;
      dismissSplash();
      setTimeout(() => document.getElementById('login-screen').classList.add('show'), 200);
    }
  });
}

function setSyncDot(s) {
  document.getElementById('sync-dot').className = s;
}

/* ─────────────────────────────────────────
   APPLY / RENDER
───────────────────────────────────────── */
function applyState() {
  setTheme(state.theme || 'dark');
  updateDateLabel();
  renderHome();
  renderList('routine');
  renderList('exercise');
  renderList('other');
  renderSettings();
}

function reRenderActive() {
  const id = document.querySelector('.page.active')?.id?.replace('page-','');
  if (id === 'home') renderHome();
  else if (id === 'routine' || id === 'exercise' || id === 'other') renderList(id);
  else if (id === 'history') renderCalendar();
  else if (id === 'settings') renderSettings();
}

function dismissSplash() {
  setTimeout(() => {
    const sp = document.getElementById('splash');
    sp.classList.add('hide');
    setTimeout(() => sp.classList.add('gone'), 520);
  }, 1800);
}

/* ─────────────────────────────────────────
   DATE NAV
───────────────────────────────────────── */
let viewingDate = new Date(), viewingKey = todayKey();

function updateDateLabel() {
  const d = viewingDate, tk = todayKey();
  const isToday = dateKey(d) === tk, isFuture = d > new Date();
  document.getElementById('date-main-label').textContent =
    `${d.getFullYear()}년 ${MONTH_KO[d.getMonth()]} ${d.getDate()}일 (${DAY_KO[d.getDay()]})`;
  document.getElementById('date-sub-label').textContent = isToday ? '오늘' : isFuture ? '미래' : '과거';
  document.getElementById('today-pill').classList.toggle('hidden', isToday);
  document.getElementById('past-banner').style.display = (!isToday && !isFuture) ? 'block' : 'none';
}
function shiftDay(delta) {
  viewingDate = new Date(viewingDate.getTime() + delta * 86400000);
  viewingKey  = dateKey(viewingDate);
  updateDateLabel(); renderHome();
}
function goToday() {
  viewingDate = new Date(); viewingKey = todayKey();
  updateDateLabel(); renderHome();
}

/* ─────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────── */
function goTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('app-content').scrollTo(0,0);
  if (id==='home')    renderHome();
  else if (id==='routine'||id==='exercise'||id==='other') renderList(id);
  else if (id==='history')  renderCalendar();
  else if (id==='settings') renderSettings();
}

/* ─────────────────────────────────────────
   HOME
───────────────────────────────────────── */
function renderHome() {
  updateDateLabel();
  const day = getDay(viewingKey);
  const all = [...day.routine, ...day.exercise, ...day.other];
  const done = all.filter(i => i.done).length;
  const pct  = all.length ? Math.round(done/all.length*100) : 0;
  const C = 395.84;
  document.getElementById('ring-fill').style.strokeDashoffset = C - C*pct/100;
  document.getElementById('ring-pct').textContent = pct+'%';
  const r=day.routine, e=day.exercise, o=day.other;
  document.getElementById('chip-routine').textContent  = r.filter(i=>i.done).length+'/'+r.length;
  document.getElementById('chip-exercise').textContent = e.filter(i=>i.done).length+'/'+e.length;
  document.getElementById('chip-other').textContent    = o.filter(i=>i.done).length+'/'+o.length;
  document.getElementById('chip-other-label').textContent = state.otherLabel;
  const undone = all.filter(i=>!i.done).slice(0,6);
  const ql = document.getElementById('home-quick-list');
  if (!undone.length) {
    ql.innerHTML = `<div class="empty-state">
      <div class="done-illust">
        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
          <defs>
            <linearGradient id="dg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6C63FF"/><stop offset="100%" stop-color="#43D9A0"/>
            </linearGradient>
            <radialGradient id="dg2" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="#43D9A0" stop-opacity="0.04"/>
            </radialGradient>
          </defs>
          <circle cx="60" cy="60" r="54" fill="url(#dg2)"/>
          <circle cx="60" cy="60" r="38" fill="url(#dg1)"/>
          <line x1="88" y1="20" x2="88" y2="29" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>
          <line x1="83.5" y1="24.5" x2="92.5" y2="24.5" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round" opacity=".75"/>
          <line x1="28" y1="88" x2="28" y2="95" stroke="#43D9A0" stroke-width="2" stroke-linecap="round" opacity=".65"/>
          <line x1="24.5" y1="91.5" x2="31.5" y2="91.5" stroke="#43D9A0" stroke-width="2" stroke-linecap="round" opacity=".65"/>
          <circle cx="25" cy="34" r="3" fill="#6C63FF" opacity=".45"/>
          <circle cx="93" cy="84" r="2.5" fill="#43D9A0" opacity=".55"/>
          <circle cx="95" cy="44" r="1.8" fill="#8B85FF" opacity=".5"/>
          <circle cx="20" cy="62" r="1.5" fill="#43D9A0" opacity=".4"/>
          <polyline points="40,60 53,74 80,46" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="done-title">모두 완료!</div>
      <div class="empty-text">오늘의 모든 항목을 해냈어요 🎉</div>
    </div>`;
    return;
  }
  const cols={routine:'var(--routine)',exercise:'var(--exercise)',other:'var(--other)'};
  const labs={routine:'루틴',exercise:'운동',other:state.otherLabel};
  ql.innerHTML = undone.map(item => {
    const cat = r.find(i=>i.id===item.id)?'routine':e.find(i=>i.id===item.id)?'exercise':'other';
    return `<div class="quick-item" onclick="toggleItem('${cat}','${item.id}')"><div class="quick-dot" style="background:${cols[cat]}"></div><span class="quick-text">${esc(item.label)}</span><span class="quick-tag">${labs[cat]}</span></div>`;
  }).join('');
}

/* ─────────────────────────────────────────
   LIST
───────────────────────────────────────── */
function renderList(cat) {
  const day   = getDay(viewingKey);
  const items = day[cat] || [];
  const done  = items.filter(i=>i.done).length;
  const pct   = items.length ? Math.round(done/items.length*100) : 0;
  const cols  = {routine:'var(--routine)',exercise:'var(--exercise)',other:'var(--other)'};
  document.getElementById(cat+'-bar').style.width = pct+'%';
  document.getElementById(cat+'-pct-label').textContent = pct+'%';
  if (cat==='other') {
    document.getElementById('other-page-title').textContent = state.otherLabel;
    document.getElementById('tab-other-label').textContent  = state.otherLabel;
    document.getElementById('chip-other-label').textContent = state.otherLabel;
  }
  const el = document.getElementById(cat+'-list');
  if (!items.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">항목이 없어요.<br>+ 추가를 눌러 시작하세요!</div></div>';
  } else {
    el.innerHTML = items.map(item => `
      <div class="check-item ${item.done?'done':''}" ${item.done?`style="--item-color:${cols[cat]}"`:''}>
        <div class="checkbox" onclick="toggleItem('${cat}','${item.id}')" style="${item.done?'background:'+cols[cat]+';box-shadow:0 0 0 3px '+cols[cat]+'33':''}">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5 L7.9 5.4 L11.5 4 L9.2 7 L11.5 10 L7.9 8.6 L7 12.5 L6.1 8.6 L2.5 10 L4.8 7 L2.5 4 L6.1 5.4 Z" stroke-width="1.4"/></svg>
        </div>
        <div style="flex:1;min-width:0" onclick="toggleItem('${cat}','${item.id}')">
          <div class="check-label">${esc(item.label)}</div>
          ${item.sub ? `<div class="check-sub">${esc(item.sub)}</div>` : ''}
        </div>
        <div class="check-actions">
          <div class="icon-btn" onclick="editItem('${cat}','${item.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
          ${cat!=='other'?`<div class="icon-btn" onclick="saveToFav('${cat}','${item.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg></div>`:''}
          <div class="icon-btn danger" onclick="deleteItem('${cat}','${item.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></div>
        </div>
      </div>`).join('');
  }
  if (cat !== 'other') {
    const sc    = document.getElementById(cat+'-saved-chips');
    const saved = state.templates[cat] || [];
    sc.innerHTML = saved.length
      ? saved.map((s,i)=>`<div class="saved-chip"><span onclick="addFromSaved('${cat}','${i}')">${esc(s.label)}</span><span class="saved-chip-del" onclick="removeSaved('${cat}','${i}')">×</span></div>`).join('')
      : '<span style="font-size:12px;color:var(--text3)">저장된 항목이 없어요</span>';
  }
}

/* ─────────────────────────────────────────
   CRUD
───────────────────────────────────────── */
function toggleItem(cat, id) {
  const item = getDay(viewingKey)[cat].find(i=>i.id===id);
  if (item) { item.done=!item.done; saveState(); renderList(cat); }
  if (document.getElementById('page-home').classList.contains('active')) renderHome();
}
function deleteItem(cat, id) {
  const day = getDay(viewingKey);
  day[cat] = day[cat].filter(i=>i.id!==id);
  saveState(); renderList(cat);
}
function editItem(cat, id) {
  const item = getDay(viewingKey)[cat].find(i=>i.id===id);
  if (!item) return;
  modalMode='edit'; modalCat=cat; editId=id;
  document.getElementById('modal-title').textContent = '항목 편집';
  document.getElementById('modal-input').value = item.label;
  document.getElementById('modal-sub').value   = item.sub || '';
  document.getElementById('modal-save-wrap').style.display = 'none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(), 100);
}

let modalMode=null, modalCat=null, editId=null;
function openModal(cat) {
  modalMode='add'; modalCat=cat; editId=null;
  document.getElementById('modal-title').textContent = '항목 추가';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-sub').value   = '';
  document.getElementById('modal-save-check').checked = false;
  document.getElementById('modal-save-wrap').style.display = cat!=='other' ? 'flex' : 'none';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(), 100);
}
function closeModal()        { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalIfBg(e)   { if (e.target===document.getElementById('modal-bg')) closeModal(); }

function saveItem() {
  const label = document.getElementById('modal-input').value.trim();
  if (!label) { document.getElementById('modal-input').style.borderColor='var(--danger)'; return; }
  document.getElementById('modal-input').style.borderColor = '';
  const sub = document.getElementById('modal-sub').value.trim();
  const day = getDay(viewingKey);
  if (modalMode === 'add') {
    day[modalCat].push({ id: Date.now().toString(), label, sub, done: false });
    if (document.getElementById('modal-save-check').checked && modalCat !== 'other') {
      const tmpl = state.templates[modalCat] || [];
      if (!tmpl.find(s=>s.label===label)) { tmpl.push({label,sub}); state.templates[modalCat]=tmpl; }
    }
  } else {
    const item = day[modalCat].find(i=>i.id===editId);
    if (item) { item.label=label; item.sub=sub; }
  }
  saveState(); closeModal(); renderList(modalCat);
}
function saveToFav(cat, id) {
  const item = getDay(viewingKey)[cat].find(i=>i.id===id);
  if (!item) return;
  const tmpl = state.templates[cat] || [];
  if (!tmpl.find(s=>s.label===item.label)) {
    tmpl.push({label:item.label, sub:item.sub||''}); state.templates[cat]=tmpl;
    saveState(); renderList(cat); showToast('저장했어요 ✓');
  } else showToast('이미 저장된 항목이에요');
}
function addFromSaved(cat, idx) {
  const s = (state.templates[cat]||[])[idx]; if (!s) return;
  getDay(viewingKey)[cat].push({id:Date.now().toString(),label:s.label,sub:s.sub||'',done:false});
  saveState(); renderList(cat);
}
function removeSaved(cat, idx) {
  (state.templates[cat]||[]).splice(idx,1); saveState(); renderList(cat);
}
function clearTodayChecks() {
  if (!confirm('오늘의 체크 상태를 모두 초기화할까요?')) return;
  const day = getDay(todayKey());
  [...day.routine,...day.exercise,...day.other].forEach(i=>i.done=false);
  saveState(); renderHome();
}
function renameOther() {
  const name = prompt('탭 이름을 입력하세요', state.otherLabel);
  if (name?.trim()) { state.otherLabel=name.trim().slice(0,10); saveState(); renderList('other'); }
}

/* ─────────────────────────────────────────
   CALENDAR
───────────────────────────────────────── */
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSelectedKey=null;
function shiftCalMonth(delta) {
  calMonth+=delta; if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar();
}
function getDayStats(key) {
  const day=state.days[key]; if(!day) return null;
  const all=[...(day.routine||[]),...(day.exercise||[]),...(day.other||[])]; if(!all.length) return null;
  const done=all.filter(i=>i.done).length;
  return { pct:Math.round(done/all.length*100), hasRoutine:(day.routine||[]).some(i=>i.done), hasExercise:(day.exercise||[]).some(i=>i.done), hasOther:(day.other||[]).some(i=>i.done) };
}
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${MONTH_KO[calMonth]}`;
  const tk=todayKey(), firstDay=new Date(calYear,calMonth,1).getDay(), days=new Date(calYear,calMonth+1,0).getDate();
  let h='';
  ['일','월','화','수','목','금','토'].forEach(d=>{ h+=`<div class="cal-dow" style="${d==='일'?'color:#FF6584':d==='토'?'color:#6C63FF':''}">${d}</div>`; });
  for(let i=0;i<firstDay;i++) h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++) {
    const key=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st=getDayStats(key), isToday=key===tk, isSel=key===calSelectedKey;
    let cls='cal-day'; if(isToday)cls+=' today'; if(isSel)cls+=' selected';
    let bg=''; if(st&&st.pct>0) bg=`background:rgba(108,99,255,${(st.pct*0.003).toFixed(2)})`;
    let dots=''; if(st){ if(st.hasRoutine)dots+=`<div class="cal-dot" style="background:var(--routine)"></div>`; if(st.hasExercise)dots+=`<div class="cal-dot" style="background:var(--exercise)"></div>`; if(st.hasOther)dots+=`<div class="cal-dot" style="background:var(--other)"></div>`; }
    const dow=new Date(calYear,calMonth,d).getDay();
    h+=`<div class="${cls}" style="${bg}" onclick="selectCalDay('${key}')"><div class="cal-day-num" style="${dow===0?'color:#FF6584':dow===6?'color:#6C63FF':''}">${d}</div>${st?`<div class="cal-day-pct">${st.pct}%</div>`:''} ${dots?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = h;
  if (calSelectedKey) renderDayDetail(calSelectedKey);
  else document.getElementById('cal-day-detail').innerHTML='';
}
function selectCalDay(key) { calSelectedKey=key; renderCalendar(); }
function renderDayDetail(key) {
  const day=state.days[key], el=document.getElementById('cal-day-detail');
  if (!day) { el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">이 날의 기록이 없어요</div></div>'; return; }
  const cats=[{k:'routine',l:'루틴',c:'var(--routine)'},{k:'exercise',l:'운동',c:'var(--exercise)'},{k:'other',l:state.otherLabel,c:'var(--other)'}];
  let h='';
  cats.forEach(({k,l,c})=>{
    const items=day[k]||[]; if(!items.length)return;
    const dc=items.filter(i=>i.done).length;
    h+=`<div class="day-detail-card"><div class="day-detail-header"><div class="day-detail-title">${l}</div><div class="day-detail-badge" style="background:color-mix(in srgb,${c} 18%,transparent);color:${c}">${dc}/${items.length} 완료</div></div><div class="day-detail-items">${items.map(i=>`<div class="day-detail-item"><div class="day-detail-check" style="background:${i.done?c:'var(--border)'}">${i.done?'<svg width="9" height="9" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5 L7.9 5.4 L11.5 4 L9.2 7 L11.5 10 L7.9 8.6 L7 12.5 L6.1 8.6 L2.5 10 L4.8 7 L2.5 4 L6.1 5.4 Z"/></svg>':''}</div><span class="day-detail-text ${i.done?'done-text':''}">${esc(i.label)}</span></div>`).join('')}</div></div>`;
  });
  el.innerHTML = h || '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">이 날의 기록이 없어요</div></div>';
}

/* ─────────────────────────────────────────
   SETTINGS
───────────────────────────────────────── */
function renderSettings() {
  const name  = fbUser?.displayName || '사용자';
  const email = fbUser?.email || '-';
  const photo = fbUser?.photoURL;
  document.getElementById('settings-name-display').textContent  = name;
  document.getElementById('settings-email-display').textContent = email;
  const av = document.getElementById('settings-avatar');
  av.innerHTML = photo
    ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover">`
    : (name[0]?.toUpperCase() || 'U');
}

/* ─────────────────────────────────────────
   THEME
───────────────────────────────────────── */
function setTheme(t) {
  state.theme = t;
  document.documentElement.setAttribute('data-theme', t==='light'?'light':'');
  document.documentElement.style.background = t==='light'?'#E8E8F5':'#0F0F14';
  document.body.style.background = t==='light'?'#F2F2FA':'#0F0F14';
  const mc=document.getElementById('theme-color-meta');
  if (mc) mc.content = t==='light'?'#F2F2FA':'#0F0F14';
  document.getElementById('theme-dark').classList.toggle('active', t==='dark');
  document.getElementById('theme-light').classList.toggle('active', t==='light');
  saveState();
}

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
function showToast(msg) {
  let t=document.getElementById('toast');
  if (!t) {
    t=document.createElement('div'); t.id='toast';
    Object.assign(t.style,{position:'fixed',bottom:'82px',left:'50%',transform:'translateX(-50%)',background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',padding:'10px 20px',borderRadius:'30px',fontSize:'13px',fontWeight:'500',zIndex:'999',whiteSpace:'nowrap',boxShadow:'0 4px 20px rgba(0,0,0,.4)',transition:'opacity .3s'});
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0', 2200);
}

/* ─────────────────────────────────────────
   FALLBACK saveState (before Firebase loads)
───────────────────────────────────────── */
window.saveState = function() {
  try { localStorage.setItem('todo-bak', JSON.stringify(state)); } catch(e) {}
};

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
document.getElementById('modal-input').addEventListener('keydown', e=>{ if(e.key==='Enter') saveItem(); });

// Apply theme & initial render immediately from local backup
setTheme(state.theme || 'dark');
updateDateLabel();
renderHome();

// ── iOS PWA 키보드 / 뷰포트 픽스 ──
// iOS PWA에서 키보드 올라올 때 body 높이가 안 줄어드는 문제 대응
(function() {
  // visualViewport API 지원하는 경우 (iOS 13+)
  if (window.visualViewport) {
    var appContent = document.getElementById('app-content');
    function onViewportResize() {
      var vh = window.visualViewport.height;
      document.body.style.height = vh + 'px';
    }
    window.visualViewport.addEventListener('resize', onViewportResize);
    window.visualViewport.addEventListener('scroll', onViewportResize);
  }

  // input/textarea에 포커스 시 스크롤해서 보이게
  document.addEventListener('focusin', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      setTimeout(function() {
        e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 320);
    }
  });
})();

// Then boot Firebase
initFirebase().catch(err => {
  console.error('Firebase init failed:', err);
  showToast('네트워크 오류 — 오프라인 모드');
  dismissSplash();
});
</script>
